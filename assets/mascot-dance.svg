<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 14 14" width="64" height="64" shape-rendering="crispEdges">
  <defs>
    <g id="mascot">
      <!-- Ears -->
      <rect x="2" y="1" width="2" height="2" fill="#d97706"/>
      <rect x="10" y="1" width="2" height="2" fill="#d97706"/>
      <!-- Head/Body -->
      <rect x="2" y="3" width="10" height="9" fill="#d97706"/>
      <rect x="3" y="2" width="8" height="1" fill="#d97706"/>
      <!-- Eyes -->
      <rect x="4" y="5" width="2" height="2" fill="#451a03"/>
      <rect x="8" y="5" width="2" height="2" fill="#451a03"/>
      <!-- Mouth -->
      <rect x="5" y="8" width="4" height="1" fill="#451a03"/>
      <!-- Feet -->
      <rect x="3" y="12" width="2" height="1" fill="#d97706"/>
      <rect x="9" y="12" width="2" height="1" fill="#d97706"/>
    </g>
  </defs>

  <use href="#mascot" transform-origin="7 7">
    <!-- Animation de translation Y -->
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0,0; 0,-3; 0,0; 0,-3; 0,0"
      keyTimes="0; 0.25; 0.5; 0.75; 1"
      dur="0.6s"
      repeatCount="indefinite"
      additive="sum"/>

    <!-- Animation de rotation -->
    <animateTransform
      attributeName="transform"
      type="rotate"
      values="0,7,7; -8,7,7; 0,7,7; 8,7,7; 0,7,7"
      keyTimes="0; 0.25; 0.5; 0.75; 1"
      dur="0.6s"
      repeatCount="indefinite"
      additive="sum"/>
  </use>
</svg>